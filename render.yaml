services:
  - type: web
    runtime: static
    name: nft-bazaar
    buildCommand: npm install --no-audit --no-fund && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_NETWORK_PASSPHRASE
        value: Test SDF Network ; September 2015
      - key: VITE_RPC_URL
        value: https://soroban-testnet.stellar.org
      - key: VITE_NFT_ID
        sync: false
      - key: VITE_PAYMENT_ID
        sync: false
      - key: VITE_MARKETPLACE_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
